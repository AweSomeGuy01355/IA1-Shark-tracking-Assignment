<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Shark Catch Map</title>
    <link rel="stylesheet" href="/vendor/leaflet.css?v=2" />
    <style>
        body, html { margin:0; padding:0; height:100%; }
        #map { width: 100%; height: 100vh; }
        #controls {
            position: absolute;
            top: 10px;
            left: 10px;
            z-index: 1000;
            background: rgba(255,255,255,0.9);
            padding: 8px;
            border-radius: 4px;
        }
        .legend {
            position: absolute;
            bottom: 30px;
            right: 10px;
            z-index: 1000;
            background: rgba(255,255,255,0.9);
            padding: 8px;
            border-radius: 4px;
            line-height: 1.4;
        }
        #info-card {
            position: absolute;
            top: 10px;
            right: 10px;
            z-index: 1000;
            background: rgba(255,255,255,0.95);
            max-width: 300px;
            padding: 8px;
            border-radius: 4px;
            display: none;
        }
        #info-card h4 { margin-top:0; }
        #info-card .close { cursor:pointer; float:right; }
        /* custom sighting marker color override */
        .sighting-marker {
            filter: hue-rotate(200deg);
        }
    </style>
</head>
<body>
    <div id="controls">
        <strong>Shark catch visualization</strong><br/>
        Use the time window selector and toggle heatmap. Click a point for details, then individual sharks for full info.<br/>
        <label for="timeFilter">Time window:</label>
        <select id="timeFilter">
            <option value="24h">Last 24 hours</option>
            <option value="1w">Last week</option>
            <option value="1m">Last month</option>
            <option value="3m">Last 3 months</option>
            <option value="6m">Last 6 months</option>
            <option value="1y">Last year</option>
            <option value="all" selected>All time</option>
        </select>
        <br/>
        <input type="checkbox" id="heatToggle" /> <label for="heatToggle">Heatmap</label>
        <br/>
        <button id="addSightingBtn">Add sighting</button>
        <span style="font-size:0.9em;color:blue;">(click map after pressing)</span>
    </div>
    <div id="map"></div>
    <div class="legend" id="legend">
        <strong>Catch frequency</strong><br/>
        <div id="legend-gradient" style="width:150px;height:12px;background:linear-gradient(to right, blue, cyan, yellow, red);"></div>
        <div><span id="legend-min">low</span> – <span id="legend-max">high</span></div>
    </div>
    <div id="info-card">
        <span class="close" onclick="document.getElementById('info-card').style.display='none'">&times;</span>
        <div id="info-content"></div>
    </div>

    <script src="/vendor/leaflet.js?v=3"></script>
    <script src="/vendor/papaparse.min.js?v=3"></script>
    <script src="/vendor/leaflet-heat.js?v=3"></script>
    <script src="map.js?v=3"></script>
</body>
</html>
