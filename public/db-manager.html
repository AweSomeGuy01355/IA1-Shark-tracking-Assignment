<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Database Manager</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Simple Database Manager</h1>
        
        <div class="section">
            <h2>Tables</h2>
            <button id="loadTables">Load Tables</button>
            <ul id="tablesList"></ul>
        </div>
        
        <div class="section">
            <h2>Run SQL Query</h2>
            <textarea id="sqlQuery" rows="5" placeholder="Enter SQL query here..."></textarea>
            <button id="runQuery">Run Query</button>
        </div>
        
        <div class="section">
            <h2>Results</h2>
            <pre id="queryResult"></pre>
        </div>
        
        <a href="index.html">Back to User Manager</a>
    </div>
    
    <script src="db-manager.js"></script>
</body>
</html>
